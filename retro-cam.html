<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>RETRO CAM</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUkVUUk8gQ0FNIiwic2hvcnRfbmFtZSI6IlJFVFJPIENBTSIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5IjoiZnVsbHNjcmVlbiIsImJhY2tncm91bmRfY29sb3IiOiIjMDAwMDAwIiwidGhlbWVfY29sb3IiOiIjMDAwMDAwIn0=">
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cam-orange: #ff8c00;
    --cam-green: #39ff14;
    --cam-red: #ff2020;
    --cam-white: #e0e0d0;
    --font-main: 'VT323', 'Share Tech Mono', 'Courier New', monospace;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: var(--font-main);
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  /* ── Camera ── */
  #camera-layer {
    position: fixed; inset: 0;
    z-index: 1;
  }
  #camera-layer video {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* ── Flash effect ── */
  #flash {
    position: fixed; inset: 0;
    z-index: 9;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s ease-out;
  }
  #flash.on { opacity: 0.9; transition: none; }

  /* ── Scanline + Vignette overlay ── */
  #fx-layer {
    position: fixed; inset: 0;
    z-index: 2;
    pointer-events: none;
  }
  #fx-layer::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    z-index: 1;
  }
  #fx-layer::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    z-index: 2;
  }

  /* ── UI Overlay ── */
  #ui-layer {
    position: fixed; inset: 0;
    z-index: 3;
    pointer-events: none;
    padding: calc(12px + var(--safe-top)) 14px calc(12px + var(--safe-bottom)) 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* ── Top bar ── */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .info-block {
    text-shadow:
      0 0 6px currentColor,
      0 0 12px currentColor,
      1px 1px 0 rgba(0,0,0,0.7);
    line-height: 1.3;
  }

  .location-block {
    color: var(--cam-green);
    font-size: clamp(13px, 3.2vw, 18px);
    max-width: 55%;
  }
  .location-block .label {
    font-size: 0.75em;
    opacity: 0.7;
    letter-spacing: 2px;
  }
  .location-block .value { letter-spacing: 1px; }

  .datetime-block {
    color: var(--cam-orange);
    font-size: clamp(14px, 3.5vw, 20px);
    text-align: right;
  }
  .datetime-block .date { letter-spacing: 2px; }
  .datetime-block .time {
    font-size: 1.15em;
    letter-spacing: 3px;
  }

  /* ── Center ── */
  .center-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    padding-top: 12px;
    gap: 6px;
  }

  .rec-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--cam-red);
    font-size: clamp(14px, 3.5vw, 20px);
    letter-spacing: 3px;
    text-shadow: 0 0 8px var(--cam-red), 0 0 16px var(--cam-red);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .rec-indicator.active { opacity: 1; }
  .rec-indicator .rec-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--cam-red);
    box-shadow: 0 0 6px var(--cam-red), 0 0 12px var(--cam-red);
    animation: blink-rec 1s ease-in-out infinite;
  }
  @keyframes blink-rec {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .status-line {
    color: var(--cam-white);
    font-size: clamp(11px, 2.6vw, 14px);
    opacity: 0.6;
    letter-spacing: 2px;
    text-shadow: 0 0 4px rgba(255,255,255,0.3);
  }

  /* ── Saved toast ── */
  .toast {
    position: fixed;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: var(--cam-green);
    font-family: var(--font-main);
    font-size: clamp(13px, 3vw, 16px);
    letter-spacing: 2px;
    padding: 8px 20px;
    border: 1px solid var(--cam-green);
    border-radius: 4px;
    text-shadow: 0 0 6px var(--cam-green);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 20;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* ── Crosshair ── */
  .crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60px; height: 60px;
    opacity: 0.25;
  }
  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: var(--cam-white);
  }
  .crosshair::before {
    top: 50%; left: 0;
    width: 100%; height: 1px;
    transform: translateY(-50%);
  }
  .crosshair::after {
    top: 0; left: 50%;
    width: 1px; height: 100%;
    transform: translateX(-50%);
  }

  /* ── Bottom bar ── */
  .bottom-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding-bottom: 8px;
    position: relative;
  }

  /* ── Mode switcher ── */
  .mode-switcher {
    pointer-events: auto;
    display: flex;
    gap: 0;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(6px);
  }
  .mode-btn {
    padding: 6px 22px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.45);
    font-family: var(--font-main);
    font-size: clamp(13px, 3vw, 16px);
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-btn.active {
    background: rgba(255,255,255,0.15);
    color: var(--cam-white);
    text-shadow: 0 0 6px rgba(255,255,255,0.5);
  }

  /* ── Shutter row ── */
  .shutter-row {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
  }

  /* ── Main shutter/rec button ── */
  .shutter-btn {
    pointer-events: auto;
    width: 72px; height: 72px;
    border-radius: 50%;
    background: transparent;
    border: 3px solid rgba(255,255,255,0.5);
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.2s;
  }
  .shutter-btn::before {
    content: '';
    width: 54px; height: 54px;
    border-radius: 50%;
    background: #fff;
    opacity: 0.9;
    transition: border-radius 0.25s ease, width 0.25s ease, height 0.25s ease, background 0.2s, opacity 0.2s;
  }
  /* video mode: red dot */
  .shutter-btn.video-mode::before {
    background: var(--cam-red);
    opacity: 0.85;
  }
  /* recording: square */
  .shutter-btn.recording::before {
    width: 26px; height: 26px;
    border-radius: 6px;
    opacity: 1;
  }
  .shutter-btn.recording {
    border-color: var(--cam-red);
    box-shadow: 0 0 12px rgba(255,32,32,0.4);
  }
  .shutter-btn:active { transform: scale(0.92); }

  /* ── Flip button ── */
  .flip-btn {
    pointer-events: auto;
    position: absolute;
    right: 16px;
    width: 44px; height: 44px;
    border: none;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;
    color: var(--cam-white);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(4px);
  }
  .flip-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

  /* ── Corner brackets ── */
  .corner {
    position: absolute;
    width: 28px; height: 28px;
    opacity: 0.35;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--cam-white);
  }
  .corner.tl { top: 18%; left: 8%; }
  .corner.tr { top: 18%; right: 8%; }
  .corner.bl { bottom: 22%; left: 8%; }
  .corner.br { bottom: 22%; right: 8%; }
  .corner.tl::before, .corner.bl::before { left: 0; width: 100%; height: 1.5px; }
  .corner.tr::before, .corner.br::before { right: 0; width: 100%; height: 1.5px; }
  .corner.tl::after, .corner.tr::after  { top: 0; width: 1.5px; height: 100%; }
  .corner.bl::after, .corner.br::after  { bottom: 0; width: 1.5px; height: 100%; }
  .corner.tl::before { top: 0; } .corner.tl::after  { left: 0; }
  .corner.tr::before { top: 0; } .corner.tr::after  { right: 0; }
  .corner.bl::before { bottom: 0; } .corner.bl::after  { left: 0; }
  .corner.br::before { bottom: 0; } .corner.br::after  { right: 0; }

  /* ── Zoom label ── */
  .zoom-label {
    position: absolute;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    color: var(--cam-orange);
    font-size: clamp(11px, 2.5vw, 14px);
    letter-spacing: 2px;
    opacity: 0.5;
    text-shadow: 0 0 4px var(--cam-orange);
  }

  /* ── Error screen ── */
  .error-screen {
    position: fixed; inset: 0;
    z-index: 10;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--cam-orange);
    font-family: var(--font-main);
    font-size: 18px;
    text-align: center;
    padding: 20px;
  }
  .error-screen .icon { font-size: 48px; opacity: 0.6; }
  .error-screen .msg { letter-spacing: 2px; text-shadow: 0 0 8px var(--cam-orange); }
  .error-screen .sub { font-size: 13px; color: var(--cam-white); opacity: 0.5; letter-spacing: 1px; }
  .error-screen.hidden { display: none; }
</style>
</head>
<body>

<div id="camera-layer">
  <video id="cam" autoplay playsinline muted></video>
</div>

<div id="fx-layer"></div>
<div id="flash"></div>

<div id="error-screen" class="error-screen hidden">
  <div class="icon">📹</div>
  <div class="msg">NO SIGNAL</div>
  <div class="sub">카메라 권한을 허용해 주세요</div>
</div>

<div class="toast" id="toast">SAVED TO NK</div>

<canvas id="capture-canvas" style="display:none"></canvas>

<div id="ui-layer">

  <div class="top-bar">
    <div class="info-block location-block">
      <div class="label">📍 LOC</div>
      <div class="value" id="location-text">LOADING...</div>
    </div>
    <div class="info-block datetime-block">
      <div class="date" id="date-text">--.--.--</div>
      <div class="time" id="time-text">--:--:--</div>
    </div>
  </div>

  <div class="center-area">
    <div class="rec-indicator" id="rec-indicator">
      <div class="rec-dot"></div>
      <span>● REC</span>
    </div>
    <div class="status-line" id="status-line">PHOTO ▸ READY</div>
  </div>

  <div class="crosshair"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="zoom-label">x1.0</div>

  <div class="bottom-bar">
    <div class="mode-switcher">
      <button class="mode-btn active" id="btn-photo">PHOTO</button>
      <button class="mode-btn" id="btn-video">VIDEO</button>
    </div>
    <div class="shutter-row">
      <button class="shutter-btn" id="shutter-btn" aria-label="Capture"></button>
      <button class="flip-btn" id="flip-btn" aria-label="Flip camera">🔄</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const $ = id => document.getElementById(id);
  const cam = $('cam');
  const shutterBtn = $('shutter-btn');
  const recIndicator = $('rec-indicator');
  const flipBtn = $('flip-btn');
  const statusLine = $('status-line');
  const errorScreen = $('error-screen');
  const flash = $('flash');
  const toast = $('toast');
  const canvas = $('capture-canvas');
  const btnPhoto = $('btn-photo');
  const btnVideo = $('btn-video');

  let mode = 'photo'; // 'photo' | 'video'
  let isRecording = false;
  let currentFacing = 'environment';
  let currentStream = null;
  let mediaRecorder = null;
  let recordedChunks = [];
  let toastTimer = null;

  // ── Filename helper ──
  function timestamp() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
  }

  // ── Toast ──
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ── Save file (share → download fallback) ──
  async function saveFile(blob, filename) {
    const file = new File([blob], filename, { type: blob.type });
    // Try Web Share API (iOS/Android saves to gallery)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'NK' });
        showToast('SAVED ✓');
        return;
      } catch (e) {
        if (e.name === 'AbortError') return; // user cancelled
      }
    }
    // Fallback: download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    showToast('SAVED ✓');
  }

  // ── Camera ──
  async function startCamera(facingMode) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: facingMode }, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: true
      });
      cam.srcObject = stream;
      currentStream = stream;
      currentFacing = facingMode;
      errorScreen.classList.add('hidden');
    } catch (e) {
      console.warn('Camera error:', e);
      errorScreen.classList.remove('hidden');
    }
  }
  startCamera(currentFacing);

  flipBtn.addEventListener('click', () => {
    if (isRecording) return;
    currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
    startCamera(currentFacing);
  });

  // ── Mode switch ──
  function setMode(m) {
    if (isRecording) return;
    mode = m;
    btnPhoto.classList.toggle('active', m === 'photo');
    btnVideo.classList.toggle('active', m === 'video');
    shutterBtn.classList.toggle('video-mode', m === 'video');
    statusLine.textContent = m === 'photo' ? 'PHOTO ▸ READY' : 'VIDEO ▸ STBY';
    recIndicator.classList.remove('active');
  }
  btnPhoto.addEventListener('click', () => setMode('photo'));
  btnVideo.addEventListener('click', () => setMode('video'));

  // ── Photo capture ──
  function capturePhoto() {
    const w = cam.videoWidth || 1920;
    const h = cam.videoHeight || 1080;
    canvas.width = w;
    canvas.height = h;
    canvas.getContext('2d').drawImage(cam, 0, 0, w, h);

    // Flash
    flash.classList.add('on');
    requestAnimationFrame(() => requestAnimationFrame(() => flash.classList.remove('on')));

    canvas.toBlob(blob => {
      if (!blob) return;
      saveFile(blob, `NK_${timestamp()}.jpg`);
    }, 'image/jpeg', 0.92);
  }

  // ── Video recording ──
  function startRecording() {
    if (!currentStream) return;
    recordedChunks = [];
    const mimeType = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm'].find(t => MediaRecorder.isTypeSupported(t)) || '';
    mediaRecorder = new MediaRecorder(currentStream, mimeType ? { mimeType } : {});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const ext = mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
      const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
      saveFile(blob, `NK_${timestamp()}.${ext}`);
    };
    mediaRecorder.start(1000);
    isRecording = true;
    shutterBtn.classList.add('recording');
    recIndicator.classList.add('active');
    statusLine.textContent = 'VIDEO ▸ REC ●';
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    isRecording = false;
    shutterBtn.classList.remove('recording');
    recIndicator.classList.remove('active');
    statusLine.textContent = 'VIDEO ▸ STBY';
  }

  // ── Shutter button ──
  shutterBtn.addEventListener('click', () => {
    if (mode === 'photo') {
      capturePhoto();
    } else {
      isRecording ? stopRecording() : startRecording();
    }
  });

  // ── DateTime ──
  function updateTime() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const yy = String(now.getFullYear()).slice(-2);
    const mm = pad(now.getMonth() + 1);
    const dd = pad(now.getDate());
    $('date-text').textContent = `${yy}.${mm}.${dd}`;
    $('time-text').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  }
  updateTime();
  setInterval(updateTime, 1000);

  // ── Location ──
  function fetchLocation() {
    if (!navigator.geolocation) { $('location-text').textContent = 'LOCATION UNKNOWN'; return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude: lat, longitude: lon } = pos.coords;
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=16&accept-language=ko`)
          .then(r => r.json())
          .then(data => {
            const a = data.address || {};
            const province = a.province || a.state || a.city || '';
            const county = a.city_district || a.county || a.borough || a.suburb || '';
            const town = a.neighbourhood || a.quarter || a.village || a.town || '';
            const parts = [province, county, town].filter(Boolean);
            $('location-text').textContent = parts.length ? parts.join(' ') : `${lat.toFixed(3)}°N ${lon.toFixed(3)}°E`;
          })
          .catch(() => { $('location-text').textContent = `${lat.toFixed(4)}°N`; });
      },
      () => { $('location-text').textContent = 'LOCATION UNKNOWN'; },
      { enableHighAccuracy: false, timeout: 8000 }
    );
  }
  fetchLocation();

  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
})();
</script>
</body>
</html>
